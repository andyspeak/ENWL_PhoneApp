<!DOCTYPE html>
<html>
<head>
    <title>ENWL Map</title>
    <meta charset="utf-8" />
    <link rel="stylesheet" href="https://unpkg.com/leaflet/dist/leaflet.css" />
    <style>
        #map { height: 100vh; }
        img.popup-img { width: 200px; border-radius: 6px; }
    </style>
</head>
<body>
    <div id="map"></div>

    <script src="https://unpkg.com/leaflet/dist/leaflet.js"></script>
    <script>
        const map = L.map('map').setView([53.5, -2.3], 9);

        L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
            maxZoom: 19
        }).addTo(map);

        fetch('mapdata.geojson')
            .then(r => r.json())
            .then(data => {
                L.geoJSON(data, {
                    onEachFeature: (feature, layer) => {
                        const img = feature.properties.image;
                        layer.bindPopup(`<img class="popup-img" src="${img}">`);
                    }
                }).addTo(map);
            });
    </script>
</body>
</html>
