<!DOCTYPE html>
<html>
<head>
    <meta charset="utf-8" />
    <title>ENWL Map (Mapbox)</title>
    <meta name="viewport" content="initial-scale=1,maximum-scale=1,user-scalable=no" />

    <script src="https://api.mapbox.com/mapbox-gl-js/v3.1.2/mapbox-gl.js"></script>
    <link href="https://api.mapbox.com/mapbox-gl-js/v3.1.2/mapbox-gl.css" rel="stylesheet" />

    <style>
        body { margin:0; padding:0; }
        #map { width:100vw; height:100vh; }
        #searchBox {
            position:absolute;
            top:10px;
            left:10px;
            z-index:10;
            padding:6px;
            width:220px;
        }
        .popup-img {
            width:200px;
            border-radius:6px;
        }
    </style>
</head>
<body>

<input id="searchBox" type="text" placeholder="Search SATS number…">

<div id="map"></div>

<script>
    mapboxgl.accessToken = 'pk.eyJ1IjoiYW5keXNwZWFrMzMiLCJhIjoiY21semFsZjE1MDRsMjNjcXYzMGttdGg1YyJ9.kqbz91v5OuZSIx0fKYyuBg';

    const map = new mapboxgl.Map({
        container: 'map',
        style: 'mapbox://styles/mapbox/streets-v12',
        center: [-2.3, 53.5],
        zoom: 9
    });

    let allFeatures = [];

    // Load your GeoJSON from GitHub Pages
    fetch('images/mapdata.geojson')
        .then(r => r.json())
        .then(data => {
            allFeatures = data.features;

            // Add source
            map.on('load', () => {
                map.addSource('points', {
                    type: 'geojson',
                    data: data
                });

                // Add markers as a layer
                map.addLayer({
                    id: 'points-layer',
                    type: 'circle',
                    source: 'points',
                    paint: {
                        'circle-radius': 6,
                        'circle-color': '#007cbf'
                    }
                });

                // Popup on click
                map.on('click', 'points-layer', (e) => {
                    const props = e.features[0].properties;
                    const coords = e.features[0].geometry.coordinates;

                    new mapboxgl.Popup()
                        .setLngLat(coords)
                        .setHTML(`
                            <b>SATS: ${props.satsnumber}</b><br>
                            <img class="popup-img" src="${props.image}">
                        `)
                        .addTo(map);
                });

                // Cursor pointer
                map.on('mouseenter', 'points-layer', () => {
                    map.getCanvas().style.cursor = 'pointer';
                });
                map.on('mouseleave', 'points-layer', () => {
                    map.getCanvas().style.cursor = '';
                });
            });
        });

    // Search filter
    document.getElementById("searchBox").addEventListener("input", function () {
        const query = this.value.trim().toLowerCase();

        const filtered = {
            type: "FeatureCollection",
            features: allFeatures.filter(f =>
                f.properties.satsnumber.toLowerCase().includes(query)
            )
        };

        if (map.getSource('points')) {
            map.getSource('points').setData(filtered);
        }
    });
</script>

</body>
</html>
